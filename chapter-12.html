  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c8a84b;
      --salt: #e8edf5;
      --fog: #b8c4d8;
      --ink: #0a0e1a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #06090f;
      color: var(--salt);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* SKY CANVAS */
    #sky-canvas {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.2rem 6vw;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
      backdrop-filter: blur(6px);
    }
    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 1rem; color: #fff;
      text-decoration: none; text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }
    .nav-chapter {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
    }
    .nav-home {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
      text-decoration: none; transition: color 0.3s;
    }
    .nav-home:hover { color: var(--gold); }

    /* MAIN CONTENT */
    .page-wrapper {
      position: relative; z-index: 2;
      max-width: 780px;
      margin: 0 auto;
      padding: 8rem 4vw 6rem;
    }

    /* CHAPTER HEADER */
    .chapter-header {
      text-align: center;
      margin-bottom: 5rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .chapter-number {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 1.5rem;
      text-shadow: 0 0 20px rgba(200,168,75,0.6);
      display: block;
    }
    .chapter-title-display {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400; line-height: 1.15;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
      margin-bottom: 1.5rem;
    }
    .chapter-title-display em { font-style: italic; color: #ffd98a; }
    .chapter-divider {
      display: flex; align-items: center; justify-content: center;
      gap: 1rem; margin-top: 2rem;
    }
    .chapter-divider-line {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(200,168,75,0.5));
    }
    .chapter-divider-line.r {
      background: linear-gradient(to left, transparent, rgba(200,168,75,0.5));
    }
    .chapter-divider-icon { color: var(--gold); font-size: 0.9rem; }

    /* BOOK PAGES — FLIP CONTAINER */
    .book-container {
      perspective: 2000px;
      margin-bottom: 6rem;
    }

    .pages-wrapper {
      position: relative;
      min-height: 200px;
    }

    /* Each "page" is a screen of text */
    .book-page {
      background: rgba(8, 14, 28, 0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2px;
      padding: 4rem 4.5rem;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
      transform-origin: left center;
      transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1.000),
                  opacity 0.4s ease;
      /* Page turn crease */
    }
    .book-page::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(to right, rgba(0,0,0,0.4), transparent);
      border-radius: 2px 0 0 2px;
    }
    .book-page::after {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 40px; height: 100%;
      background: linear-gradient(to left, rgba(0,0,0,0.15), transparent);
      pointer-events: none;
    }

    /* Flip animation states */
    .book-page.flip-out {
      animation: flipOut 0.5s ease-in forwards;
    }
    .book-page.flip-in {
      animation: flipIn 0.5s ease-out forwards;
    }
    .book-page.flip-out-back {
      animation: flipOutBack 0.5s ease-in forwards;
    }
    .book-page.flip-in-back {
      animation: flipInBack 0.5s ease-out forwards;
    }

    @keyframes flipOut {
      0%   { transform: rotateY(0deg); opacity: 1; }
      100% { transform: rotateY(-90deg); opacity: 0; }
    }
    @keyframes flipIn {
      0%   { transform: rotateY(90deg); opacity: 0; }
      100% { transform: rotateY(0deg); opacity: 1; }
    }
    @keyframes flipOutBack {
      0%   { transform: rotateY(0deg); opacity: 1; }
      100% { transform: rotateY(90deg); opacity: 0; }
    }
    @keyframes flipInBack {
      0%   { transform: rotateY(-90deg); opacity: 0; }
      100% { transform: rotateY(0deg); opacity: 1; }
    }

    /* PAGE CONTENT */
    .page-text {
      font-size: clamp(1.1rem, 1.8vw, 1.3rem);
      line-height: 2.0;
      color: rgba(232,237,245,0.92);
    }
    .page-text p { margin-bottom: 1.8em; }
    .page-text p:last-child { margin-bottom: 0; }

    /* Opening drop cap */
    .page-text.first-page p:first-child::first-letter {
      font-family: 'Playfair Display', serif;
      font-size: 4.5em;
      float: left;
      line-height: 0.75;
      margin-right: 0.1em;
      margin-top: 0.08em;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(200,168,75,0.5);
    }

    /* PAGE COUNTER */
    .page-counter {
      text-align: center;
      margin: 1.5rem 0 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);

    .page-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      margin: 0 3px;
      transition: all 0.3s;
      vertical-align: middle;
    }
    .page-dot.active {
      background: var(--gold);
      box-shadow: 0 0 8px rgba(200,168,75,0.7);
      transform: scale(1.3);
    }

    /* IN-PAGE NAV (prev/next page within chapter) */
    .page-nav {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 1rem; gap: 1rem;
    }
    .page-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.15em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      padding: 0.7rem 1.4rem;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
      display: flex; align-items: center; gap: 0.6rem;
    }
    .page-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.35);
      color: #fff;
      transform: translateX(0) scale(1.02);
    }
    .page-btn:disabled { opacity: 0.25; cursor: default; }
    .page-btn.prev:hover:not(:disabled) { transform: translateX(-3px); }
    .page-btn.next:hover:not(:disabled) { transform: translateX(3px); }
    .page-btn-arrow { font-size: 1rem; }

    .chapter-end {

    @keyframes pulse {

    .chapter-end h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; font-weight: 400;
      margin-bottom: 0.8rem;

    .chapter-end p {
      font-size: 1.1rem; color: var(--fog);
      margin-bottom: 3rem; font-style: italic;

    .chapter-nav-btns {

    .chapter-nav-btn.next-ch {

<script>

const CHAPTER_NUM = 12;   // ← change this number for each chapter
const TOTAL_CHAPTERS = 29;

// ══════════════════════════════════════════

const CHAPTER_TEXT = `
  <p>The light from the ship extinguished as multiple guns fired into the air. Eonni grabbed me by the back of my shirt and shoved me down to the rocks, pain sparking through my limbs. I couldn't see anything as I felt my body rolling and tumbling on the ground as Eonni dragged me somewhere. Where was Halmeoni? Taejae? Yeomjae? I couldn't feel him anymore.</p>
  <p>Eonni screamed something to me, but I couldn't understand what she was saying. I opened my mouth to tell her to stop, but before I could say anything, the ocean swallowed me whole.</p>
  <p>It took me a second before I realized that I was thrust into the ravaging ocean. I thrashed under the violent currents as I tried to regain my balance, but the waves pushed me back, throwing me around like a rag.</p>
  <p>I suddenly felt my arms graze something stable and gritty. Land. I immediately thrust my hands in front of me, clawing my way out of the frenzy of the waves, coughing seawater from my lungs. I crawled my way out of the waves, my body trembling as I touched the cool sand. My limbs felt heavy. Looking up, I nearly screamed out loud, but didn't have the energy to do so. Running down the mountain were a group of soldiers—a patrol—rifles raised. There were more voices around us. Strangers. Looking around I gasped as I saw a group of people—around twelve—racing towards the currents and towards our boat. Who were they?</p>
  <p>Climbing onto my feet, I quickly surveyed my surroundings. I was on sand. The rocks stood in between me and the mountain where the soldiers were now sprinting towards, their endless gunshots waking the whole village far away. Suddenly, I felt a hand grab my arm. I shrieked and tried to push away, but Halmeoni's voice shouted at me to stop.</p>
  <p>"You need to swim, Hwajae. Swim to the boat," She said, shaking me roughly to regain my senses.</p>
  <p>"Who are these people? Where–"</p>
  <p>"Defectors hiding in a cave," Halmeoni said, "They must have seen the boat."</p>
  <p>"What about you?" I asked, flinching as a gunshot, too close, rang in the air.</p>
  <p>"I'll swim just fine. But I need you to swim with Yeomjae."</p>
  <p>I looked at Yeomjae who was on Halmeoni's back and nodded, "I will."</p>
  <p>"You must hurry. The sun is starting to rise."</p>
  <p>I nodded again as I took Yeomjae and tied him onto my back. He was wide awake and had his arms tightly around my neck.</p>
  <p>Halmeoni then started running as fast as she could towards the water. The sight was heartbreaking, but I didn't spare a moment to feel anything really. Rushing into the water, I stretched my arms and legs to fight against the current. I was able to see the boat now. I was also able to see the other people in the water swimming towards the boat.</p>
  <p>The gunshots kept coming, and one person in the water screamed as he leaked red, his head drooping under the water's surface. But I didn't stop fighting against the current. But soon, my feet lost contact with the ocean floor, and a shiver went down my spine, my toes grazing nothing.</p>
  <p>The ocean felt like it was trying to tear me apart, its waves constantly slamming me under. I panicked, fearing that Yeomjae would get lost. I didn't know where Halmeoni was anymore as I soon was pushed under the surface more often than actually getting closer to the boat. My whole body felt like it was on the brink of collapse.</p>
  <p>As soon as I broke the surface to take a deep breath, a giant wave suddenly crashed down on me, sending me deep down into the abyss. I blubbered as the waves felt more formidable under the surface, shoving me back towards the shore as I reached behind my back to grab onto Yeomjae, who also clung to me with his nails painfully digging into my skin. I tumbled and tumbled, sand burning against my skin, my ears ringing, my head nearly bursting from nausea as I finally felt my head slam onto land, my neck nearly cracking on impact. My head finally reached the air as I gasped, throwing up. My whole body racked with pain as I crawled onto the sand, my ears popping.</p>
  <p>I still clung to Yeomjae who was trembling on my back. The soldiers were nowhere to be seen but the gunshots still filled the air. I wobbled to my feet and stared at the boat that was now…bigger. No—not bigger.</p>
  <p>Closer.</p>
  <p>I gasped as I could now see the figures on the boat. Why was the boat getting closer? It was already dangerous, and getting closer would give the soldiers an advantage. I squinted my eyes as I searched for my brother.</p>
  <p>There.</p>
  <p>At the very edge of the boat, I saw him waving his arms frantically at me. I couldn't see the details of his appearance, but the shape of his body was what I recognized. Was he moving the boat closer for me? Quickly looking around, I saw that the rest of my family was nowhere to be seen. They must be on the boat already, since Eonni had guided Taejae and Halmeoni through the waters. I was the only one left.</p>
  <p>I couldn't swim to the boat. Even if it got closer, I still couldn't fight past the waves. It was too strong, and I was too small. A twelve-year-old girl was nothing compared to the strength of the ocean. It looked like Oppa understood, but still waved for me to try again. We didn't have time, he seemed to say.</p>
  <p>I choked as I took another step towards the ocean, my bones screaming from the pain. I had to have bruised a few of them, but the adrenaline that blinded my senses seemed to have blanketed all the pain. For now, at least.</p>
  <p>I re-tied Yeomjae as I slicked my hair back with my hands, my legs shaking with newfound energy. I didn't know where it came from. I balled my fists and sprinted as fast as I could into the waves. Gunshots still rained down into the water as four people were swimming towards the boat. I lunged into the water, my whole body fighting against the current. Sea water immediately filled my ears and nose, burning my eyes like they were on fire. But I kept kicking my feet and swinging my arms in the water while making sure that Yeomjae and I were getting breaths of air.</p>
  <p>As I lifted my head from the water's surface to take a breath, my stomach dropped when I saw another large wave surging towards us. It wasn't big for adults, for they were easily cruising through it. But to me?</p>
  <p>Before I could make a decision, the wave folded on top of us, dragging me deep underwater. Again, another episode of tumbling and rolling nearly knocked me out as I gasped for breath, again regaining my senses on the sweet sandy shore.</p>
  <p>This was impossible.</p>
  <p>Taejae was smaller than me, but still made it through with Eonni's help. I had now endangered not my own life but my whole family because I just couldn't swim. But then, I froze and listened. An eerie silence had blanketed the shore, but there was something ringing in the air. Not gunshots, but the metallic clicks of boots hitting stone.</p>
  <p>Too close.</p>
  <p>I jumped up from the ground and ran towards the waves once more. But as soon as I took a step forward, my knees buckled. No, no, no. My body couldn't betray me now. Not yet.</p>
  <p>I tried to pull myself up, but my arms gave out and I laid on the ground, breathing hard.</p>
  <p>Move.</p>
  <p>Maybe if I fell asleep now, I wouldn't feel it when they found me.</p>
  <p>Move.</p>
  <p>Yeomjae was squirming on my back, as if sensing the danger.</p>
  <p>Move.</p>
  <p>At least he had some energy left.</p>
  <p>Move.</p>
  <p>With the side of my face laying on the ground, I stared at my right hand that was beside my face. There was enough light in the sky now that I could see more clearly, and that was when I realized that my fingernails were all torn off, bleeding and bruised. It must have been when we were climbing the rocks. I was too tired to even notice the pain.</p>
  <p>But something else was missing. What was it? I furrowed my brows, forcing my heavy eyes to stay open. Something was missing.</p>
  <p>My mother's rings.</p>
  <p>My eyes widened, my jaws slackening. The rings were gone, my bare fingers twitching awkwardly, noticing the heavy weight of them gone. I never noticed.</p>
  <p>My throat choked and tears threatened to form in my eyes. The panicked voices of a family near me started to drown away, my eyes slowly starting to close for the last time. But suddenly, a familiar voice shouted over the others.</p>
  <p>"The girl!" my brother shouted. "The girl and the baby!"</p>
  <p>I looked up. He pointed straight at me.</p>
  <p>"Bring them to the boat and you can come with us!"</p>
  <p>The people on shore with me froze. It was as if the focus of the whole world had now zoomed onto me and Yeomjae, their stares boring into me.</p>
  <p>Move.</p>
  <p>Suddenly, five strangers who were on the shore started running towards me, their arms outstretched. I immediately sat up and twisted Yeomjae around to my chest, hugging him tightly as desperate hands yanked me up.</p>
`;

// ══════════════════════════════════════════
//  PAGE SPLIT — break text into pages
// ══════════════════════════════════════════
function splitIntoPages(html, wordsPerPage = 180) {
  const temp = document.createElement('div');
  temp.innerHTML = html;
  const paragraphs = Array.from(temp.querySelectorAll('p')).map(p => p.outerHTML);

  const pages = [];
  let current = [];
  let wordCount = 0;

  paragraphs.forEach(p => {
    const words = p.replace(/<[^>]+>/g, '').split(/\s+/).length;
    if (wordCount + words > wordsPerPage && current.length > 0) {
      pages.push(current.join(''));
      current = [p];
      wordCount = words;
    } else {
      current.push(p);
      wordCount += words;
    }
  });
  if (current.length > 0) pages.push(current.join(''));
  return pages;
}

const pages = splitIntoPages(CHAPTER_TEXT);
let currentPage = 0;
let isAnimating = false;

  titleEl.textContent = CHAPTER_TITLE;

}

document.getElementById('end-chapter-num').textContent = CHAPTER_NUM;

const nextChBtn = document.getElementById('btn-next-chapter');
if (CHAPTER_NUM > 1) {
  prevChBtn.href = `chapter-${CHAPTER_NUM - 1}.html`;
} else {
  prevChBtn.style.display = 'none';
}
if (CHAPTER_NUM < TOTAL_CHAPTERS) {
  nextChBtn.href = `chapter-${CHAPTER_NUM + 1}.html`;
} else {
  nextChBtn.textContent = '🎉 The End';
  nextChBtn.href = 'index.html';
}

function renderPage() {
  const pageEl = document.getElementById('current-page');
  const textEl = document.getElementById('page-text');
  textEl.innerHTML = pages[currentPage];
  if (currentPage === 0) textEl.classList.add('first-page');
  else textEl.classList.remove('first-page');

  // Dots
  const counter = document.getElementById('page-counter');
  counter.innerHTML = pages.map((_, i) =>
    `<span class="page-dot ${i === currentPage ? 'active' : ''}"></span>`
  ).join('') + `&nbsp; <span style="opacity:0.4">${currentPage + 1} / ${pages.length}</span>`;

  // Buttons
  document.getElementById('btn-prev-page').disabled = currentPage === 0;
  document.getElementById('btn-next-page').disabled = currentPage === pages.length - 1;

  // Show chapter end on last page
  const endEl = document.getElementById('chapter-end');
  if (currentPage === pages.length - 1) {
    endEl.classList.add('visible');
  } else {
    endEl.classList.remove('visible');
  }

  // Progress bar
  const progress = ((currentPage + 1) / pages.length) * 100;
  document.getElementById('progress-bar').style.width = progress + '%';
}

function changePage(dir, instant = false) {
  if (isAnimating) return;
  const next = currentPage + dir;
  if (next < 0 || next >= pages.length) return;

  isAnimating = true;
  const pageEl = document.getElementById('current-page');

  const outClass = dir > 0 ? 'flip-out' : 'flip-out-back';
  const inClass  = dir > 0 ? 'flip-in'  : 'flip-in-back';

  pageEl.classList.add(outClass);

  setTimeout(() => {
    currentPage = next;
    pageEl.classList.remove(outClass);
    renderPage();
    pageEl.classList.add(inClass);
    setTimeout(() => {
      pageEl.classList.remove(inClass);
      isAnimating = false;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 500);
  }, 450);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changePage(-1);
});

// Touch/swipe navigation
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) changePage(dx < 0 ? 1 : -1);
}, { passive: true });

// Init
renderPage();

// ══════════════════════════════════════════
//  SKY CANVAS (same as homepage, always night/dusk for reading)
// ══════════════════════════════════════════
const canvas = document.getElementById('sky-canvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const stars = Array.from({length: 160}, () => ({
  x: Math.random(), y: Math.random() * 0.72,
  size: Math.random() * 2.2 + 0.4,
  phase: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.7 + 0.3,
  brightness: Math.random() * 0.6 + 0.4
}));
const waves = [
  { y:0.77, amp:14, freq:0.007, spd:0.5, alpha:0.28, w:2.8 },
  { y:0.81, amp:10, freq:0.011, spd:0.75, alpha:0.20, w:2.0 },
  { y:0.84, amp:7,  freq:0.016, spd:0.4,  alpha:0.14, w:1.5 },
  { y:0.88, amp:4,  freq:0.025, spd:0.9,  alpha:0.09, w:1.0 },
];

function drawChapterSky(ts) {
  const t = ts / 1000;
  const W = canvas.width, H = canvas.height;

  // Deep night sky
  const sg = ctx.createLinearGradient(0, 0, 0, H * 0.85);
  sg.addColorStop(0, '#010206');
  sg.addColorStop(0.5, '#020810');
  sg.addColorStop(1, '#060e1e');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);

  // Moon
  const mx = W * 0.75, my = H * 0.14, mr = 22;
  const mg = ctx.createRadialGradient(mx, my, 0, mx, my, mr * 4);
  mg.addColorStop(0, 'rgba(180,200,255,0.22)');
  mg.addColorStop(1, 'transparent');
  ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mx, my, mr*4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,252,235,0.95)'; ctx.fill();
  ctx.beginPath(); ctx.arc(mx - mr*0.2, my - mr*0.15, mr*0.85, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(5,8,20,0.92)'; ctx.fill();

  // Stars
  stars.forEach(s => {
    const tw = 0.45 + 0.55 * Math.sin(s.phase + t * s.speed);
    const a = s.brightness * tw * 0.92;
    ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,235,${a})`; ctx.fill();
    if (s.size > 1.5 && a > 0.5) {
      ctx.strokeStyle = `rgba(255,255,220,${a*0.4})`; ctx.lineWidth = 0.5;
      const len = s.size * 3;
      ctx.beginPath();
      ctx.moveTo(s.x*W-len, s.y*H); ctx.lineTo(s.x*W+len, s.y*H);
      ctx.moveTo(s.x*W, s.y*H-len); ctx.lineTo(s.x*W, s.y*H+len);
      ctx.stroke();
    }
  });

  // Ocean
  const ot = H * 0.74;
  const og = ctx.createLinearGradient(0, ot, 0, H);
  og.addColorStop(0, 'rgba(5,10,35,0.97)');
  og.addColorStop(1, 'rgba(3,6,20,1)');
  ctx.fillStyle = og; ctx.fillRect(0, ot, W, H - ot);

  // Moon reflection
  const mrg = ctx.createLinearGradient(mx, ot, mx, H);
  mrg.addColorStop(0, 'rgba(180,200,255,0.22)');
  mrg.addColorStop(1, 'transparent');
  ctx.fillStyle = mrg; ctx.fillRect(mx-18, ot, 36, H-ot);

  // Waves
  waves.forEach(wv => {
    const wy = H * wv.y;
    ctx.beginPath(); ctx.moveTo(0, wy);
    for (let x = 0; x <= W; x += 2) {
      const y = wy + Math.sin(x*wv.freq + t*wv.spd)*wv.amp
                   + Math.sin(x*wv.freq*1.7 + t*wv.spd*0.6)*wv.amp*0.4;
      ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(255,255,255,${wv.alpha})`; ctx.lineWidth = wv.w; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, wy);
    for (let x = 0; x <= W; x += 2) {
      const y = wy + Math.sin(x*wv.freq + t*wv.spd)*wv.amp
                   + Math.sin(x*wv.freq*1.7 + t*wv.spd*0.6)*wv.amp*0.4 - 2.5;
      ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(255,255,255,${wv.alpha*0.3})`; ctx.lineWidth = wv.w*0.4; ctx.stroke();
  });

  requestAnimationFrame(drawChapterSky);
}
requestAnimationFrame(drawChapterSky);
</script>
</body>
