<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter 9 — Irene Lee</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c8a84b;
      --salt: #e8edf5;
      --fog: #b8c4d8;
      --ink: #0a0e1a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #06090f;
      color: var(--salt);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* SKY CANVAS */
    #sky-canvas {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.2rem 6vw;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
      backdrop-filter: blur(6px);
    }
    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 1rem; color: #fff;
      text-decoration: none; text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }
    .nav-chapter {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
    }
    .nav-home {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
      text-decoration: none; transition: color 0.3s;
    }
    .nav-home:hover { color: var(--gold); }

    /* MAIN CONTENT */
    .page-wrapper {
      position: relative; z-index: 2;
      max-width: 780px;
      margin: 0 auto;
      padding: 8rem 4vw 6rem;
    }

    /* CHAPTER HEADER */
    .chapter-header {
      text-align: center;
      margin-bottom: 5rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .chapter-number {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 1.5rem;
      text-shadow: 0 0 20px rgba(200,168,75,0.6);
      display: block;
    }
    .chapter-title-display {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400; line-height: 1.15;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
      margin-bottom: 1.5rem;
    }
    .chapter-title-display em { font-style: italic; color: #ffd98a; }
    .chapter-divider {
      display: flex; align-items: center; justify-content: center;
      gap: 1rem; margin-top: 2rem;
    }
    .chapter-divider-line {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(200,168,75,0.5));
    }
    .chapter-divider-line.r {
      background: linear-gradient(to left, transparent, rgba(200,168,75,0.5));
    }
    .chapter-divider-icon { color: var(--gold); font-size: 0.9rem; }

    /* BOOK PAGES — FLIP CONTAINER */
    .book-container {
      perspective: 2000px;
      margin-bottom: 6rem;
    }

    .pages-wrapper {
      position: relative;
      min-height: 200px;
    }

    /* Each "page" is a screen of text */
    .book-page {
      background: rgba(8, 14, 28, 0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2px;
      padding: 4rem 4.5rem;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
      transform-origin: left center;
      transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1.000),
                  opacity 0.4s ease;
      /* Page turn crease */
    }
    .book-page::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(to right, rgba(0,0,0,0.4), transparent);
      border-radius: 2px 0 0 2px;
    }
    .book-page::after {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 40px; height: 100%;
      background: linear-gradient(to left, rgba(0,0,0,0.15), transparent);
      pointer-events: none;
    }

    /* Flip animation states */
    .book-page.flip-out {
      animation: flipOut 0.5s ease-in forwards;
    }
    .book-page.flip-in {
      animation: flipIn 0.5s ease-out forwards;
    }
    .book-page.flip-out-back {
      animation: flipOutBack 0.5s ease-in forwards;
    }
    .book-page.flip-in-back {
      animation: flipInBack 0.5s ease-out forwards;
    }

    @keyframes flipOut {
      0%   { transform: rotateY(0deg); opacity: 1; }
      100% { transform: rotateY(-90deg); opacity: 0; }
    }
    @keyframes flipIn {
      0%   { transform: rotateY(90deg); opacity: 0; }
      100% { transform: rotateY(0deg); opacity: 1; }
    }
    @keyframes flipOutBack {
      0%   { transform: rotateY(0deg); opacity: 1; }
      100% { transform: rotateY(90deg); opacity: 0; }
    }
    @keyframes flipInBack {
      0%   { transform: rotateY(-90deg); opacity: 0; }
      100% { transform: rotateY(0deg); opacity: 1; }
    }

    /* PAGE CONTENT */
    .page-text {
      font-size: clamp(1.1rem, 1.8vw, 1.3rem);
      line-height: 2.0;
      color: rgba(232,237,245,0.92);
    }
    .page-text p { margin-bottom: 1.8em; }
    .page-text p:last-child { margin-bottom: 0; }

    /* Opening drop cap */
    .page-text.first-page p:first-child::first-letter {
      font-family: 'Playfair Display', serif;
      font-size: 4.5em;
      float: left;
      line-height: 0.75;
      margin-right: 0.1em;
      margin-top: 0.08em;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(200,168,75,0.5);
    }

    /* PAGE COUNTER */
    .page-counter {
      text-align: center;
      margin: 1.5rem 0 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
    }
    .page-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      margin: 0 3px;
      transition: all 0.3s;
      vertical-align: middle;
    }
    .page-dot.active {
      background: var(--gold);
      box-shadow: 0 0 8px rgba(200,168,75,0.7);
      transform: scale(1.3);
    }

    /* IN-PAGE NAV (prev/next page within chapter) */
    .page-nav {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 1rem; gap: 1rem;
    }
    .page-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.15em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      padding: 0.7rem 1.4rem;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
      display: flex; align-items: center; gap: 0.6rem;
    }
    .page-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.35);
      color: #fff;
      transform: translateX(0) scale(1.02);
    }
    .page-btn:disabled { opacity: 0.25; cursor: default; }
    .page-btn.prev:hover:not(:disabled) { transform: translateX(-3px); }
    .page-btn.next:hover:not(:disabled) { transform: translateX(3px); }
    .page-btn-arrow { font-size: 1rem; }

    /* END OF CHAPTER */
    .chapter-end {
      display: none;
      text-align: center;
      padding: 5rem 2rem;
      background: rgba(8,14,28,0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .chapter-end.visible { display: block; }
    .chapter-end-symbol {
      font-size: 2rem; color: var(--gold); margin-bottom: 2rem;
      text-shadow: 0 0 25px rgba(200,168,75,0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    .chapter-end h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; font-weight: 400;
      margin-bottom: 0.8rem;
    }
    .chapter-end p {
      font-size: 1.1rem; color: var(--fog);
      margin-bottom: 3rem; font-style: italic;
    }
    .chapter-nav-btns {
      display: flex; justify-content: center;
      align-items: center; gap: 1.5rem; flex-wrap: wrap;
    }
    .chapter-nav-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.18em;
      text-transform: uppercase; text-decoration: none;
      padding: 1rem 2rem;
      transition: all 0.3s; display: flex; align-items: center; gap: 0.8rem;
    }
    .chapter-nav-btn.prev-ch {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.7);
    }
    .chapter-nav-btn.prev-ch:hover {
      border-color: rgba(255,255,255,0.6); color: #fff;
      transform: translateX(-4px);
    }
    .chapter-nav-btn.next-ch {
      background: var(--gold); color: var(--ink);
      box-shadow: 0 0 30px rgba(200,168,75,0.45);
    }
    .chapter-nav-btn.next-ch:hover {
      background: #ffd060;
      transform: translateX(4px);
      box-shadow: 0 0 45px rgba(200,168,75,0.65);
    }
    .chapter-nav-btn.toc {
      background: transparent;
      border: 1px solid rgba(200,168,75,0.35);
      color: var(--gold);
    }
    .chapter-nav-btn.toc:hover {
      border-color: var(--gold);
      box-shadow: 0 0 15px rgba(200,168,75,0.2);
    }

    /* PROGRESS BAR */
    .reading-progress {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px; z-index: 200;
      background: rgba(255,255,255,0.08);
    }
    .reading-progress-bar {
      height: 100%;
      background: linear-gradient(to right, var(--gold), #7fffda);
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(200,168,75,0.7);
    }

    /* KEYBOARD HINT */
    .keyboard-hint {
      text-align: center;
      margin-top: 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem; letter-spacing: 0.15em;
      color: rgba(255,255,255,0.2);
    }
    kbd {
      display: inline-block;
      padding: 0.15rem 0.4rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 3px;
      font-size: 0.5rem;
      margin: 0 2px;
    }
  </style>
</head>

<canvas id="sky-canvas"></canvas>

<!-- Reading progress bar -->
<div class="reading-progress">

<div class="page-wrapper">

  <!-- Chapter header -->
  <div class="chapter-header">

    <h1 class="chapter-title-display" id="chapter-title-display">
      <!-- Title goes here, or just "Chapter 1" -->
    </h1>
    <div class="chapter-divider">
      <div class="chapter-divider-line"></div>

<script>
// ══════════════════════════════════════════
//  CONFIGURATION — change this per chapter
// ══════════════════════════════════════════
const CHAPTER_NUM = 9;   // ← change this number for each chapter
const TOTAL_CHAPTERS = 29;
const CHAPTER_TITLE = ''; // ← add title here when ready, e.g. "The Departure"

// ══════════════════════════════════════════
//  CHAPTER TEXT — paste content here
// ══════════════════════════════════════════
const CHAPTER_TEXT = `
  <p>The village was crowded with people, its narrow streets packed with merchants. Objects and food were laid out on top of large pieces of cloth on the ground, some with a small canopy above their heads to protect themselves from the sun.</p>
  <p>Eonni gave me fifty won, which I had tightly in my hand. My other hand was firmly locked with my sisters. She didn't want me to get lost, especially in crowded streets like this.</p>
  <p>"Bbang for ten won! Freshly baked bbang for ten won!" An old woman's voice cried out. Looking over my shoulder, I examined the bread that was on top of the woman's cloth. They looked small, and most definitely not freshly baked. Looking over a few more stalls, I saw another stall that had bigger and fresher bbang for ten won.</p>
  <p>"Should we buy these? Five for fifty won is perfect. One for all of us." I whispered to Eonni without the seller noticing. If they thought you were interested in their goods, they would never let you go.</p>
  <p>"Perhaps." My sister nodded and beckoned me to buy five. Walking towards the stall, the seller noticed me and immediately waved to come closer. She was an old woman with white hair and dark wrinkly skin from life-long sun exposure. Her teeth were yellow, but her fingers were clean and not stained from dirt.</p>
  <p>"Five for fifty won?" I asked as I inspected the loaves that were piled on top of a large wooden plate. They looked fresh, the warm scent of newly baked bread wafting up to my nose. My stomach grumbled.</p>
  <p>"Yes, yes! I'll gather them up for you." The woman grabbed a plastic bag and eagerly stored five large loaves into it. "You're lucky, girl. This is my first batch that I made just now. Usually my customers would flood my stall, but you came before all of them." She gave me a large yellow smile.</p>
  <p>I smiled awkwardly and accepted the heavy bag with two hands and a small bow. It was important to always show respect to elders. Taking out the small folded paper of fifty won, I flinched when she yanked it out of my hand.</p>
  <p>"Sorry for that, girl! You know people here steal the second they see won in the air. It disappears like poof!" She pocketed the bill and made a fake explosion with her hands.</p>
  <p>I chuckled nervously and thanked her again. Briskly walking back, I saw Eonni with crossed arms, staring at me with disapproval.</p>
  <p>"Why did you strike up a conversation with her? We have to keep a low profile. Now she knows the details of your appearance." She frowned as she whispered into my ear.</p>
  <p>"It's fine," I rolled my eyes as I handed her the bag of bread, "She was the one who talked, I barely said anything. If we look scared, they'll notice."</p>
  <p>My sister sighed but gave me a sharp glance. "Do you think this will be enough? We still have two hundred won from grandma's savings."</p>
  <p>"Maybe something more filling?" I suggested, "I'm starving."</p>
  <p>"Yes, let's." Eonni nodded and we both set off deeper into the sea of the market.</p>
  <p>The sun was falling over the horizon when we made our way back to Halmeoni and the others, painting the sky with streaks of orange and gold. The market had died down into a quiet buzz as sellers closed up for the night. My arms were full of goods, as were my sisters. Tonight would be a feast.</p>
  <p>We had spent one hundred won after buying the bbang, and with that we were able to buy many things. My mouth watered as I smelled the sweet and savory aromas of the food, and my sister had complained about starving the whole way up.</p>
  <p>Taejae was the first to see us arrive, and ran to see what we bought. The sky was now turning a dark hue, and the crickets started their scratchy tune.</p>
  <p>"Sikhye!" He squealed when he took a bundle out of my arms. Inside were two small cans of cold Sikhye, a traditional rice drink that was sweet and refreshing. He snatched another bundle, the smallest one, and would have screamed with delight had my grandma not shushed him. It was a rare sight: a small bag of colorful hard candy.</p>
  <p>"How did you get candy and sikhye? You didn't spend all the money, did you?" My grandma raised her eyebrows as she beheld the goods. She had Yeomjae on her back, and did not have hands to comb through the packages as well.</p>
  <p>"No, Halmeoni. We still have one hundred won." My sister handed her the bills as Taejae rummaged through the rest of the goods. I took Yeomjae from my grandma and placed him on my lap as I sat down on the grass. Everyone followed and we sat in a circle, with all the food inside it.</p>
  <p>Bbang, sikhye, candy, and one large roasted mackerel sat in the center of us all, its rich scents making us all drool. It had been forever since we had a proper meal together. My fingers twitched to grab a loaf of bread, but I held back as my grandma reached for one herself. The eldest always took the first bite before everyone dug in. Usually, I had waited patiently with much respect, but now it felt like eternity as I watched her bring the bread to her mouth and take a large bite. As soon as she took a bite, I lunged for my loaf, nearly stuffing my face with it as everyone else reached for theirs. Well, everyone except Yeomjae.</p>
  <p>"Oh no! I totally forgot to buy milk." My sister gasped with her bread still midair in her grasp.</p>
  <p>We all froze as we watched Yeomjae gurgle angrily with hunger, his small fists waving furiously in the air.</p>
  <p>"Perhaps we can feed him sikhye?" Taejae suggested.</p>
  <p>"Too sweet," My grandma shook her head. "Dip the bread in the water that we have so that it is soft enough to eat."</p>
  <p>"I'm sorry," My sister's shoulders sagged, "I should have thought about Yeomjae."</p>
  <p>"It's not your fault," My grandma smiled, "Besides, milk is rarer than candy these days. You wouldn't have found it anyway."</p>
  <p>Silence unfolded again as we all watched Yeomjae nibble the soaked pieces of bread from Taejae's fingers. Fortunately, he didn't seem to have any issues and seemed to enjoy the change.</p>
  <p>The sun had completely settled by then, and the humming of the nocturnal animals began to fill the air, its tunes being the only sound in the stillness other than the rise and fall of our breaths. Halmeoni had gone to bed early and I couldn't blame her for that. When her snores echoed in the darkness, we decided to go to bed ourselves.</p>
  <p>Settling beside Halmeoni, I let out a breath of exhaustion as I stared at the starry sky above me. The tree tops covered most of it, but I was still able to see the twinkling lights from the stars above. With Taejae and Yeomjae to my left and Eonni next to them, I couldn't fall asleep as they all fell into their dreamless slumbers. Everything felt too still. It was pleasant, but disturbing. How come nobody had tried to come looking for us? Someone from the village, perhaps? They must have noticed by now that our home was completely dark, our fields growing weeds. My eyelids felt heavy against my eyes, but sleep did not come. It was as if my senses had become sharper and more aware of every little noise of the forest. The creak of the trees, the shuffles of the leaves, the grass shifting next to my ears.</p>
  <p>Tomorrow, the peace will be disturbed. Our time of leisure hidden in the mountains would be gone. Tomorrow, we would go down to the coast one last time, and never return to the mountains again.</p>
`;

// ══════════════════════════════════════════
//  PAGE SPLIT — break text into pages
// ══════════════════════════════════════════
function splitIntoPages(html, wordsPerPage = 180) {
  const temp = document.createElement('div');
  temp.innerHTML = html;
  const paragraphs = Array.from(temp.querySelectorAll('p')).map(p => p.outerHTML);

  const pages = [];
  let current = [];
  let wordCount = 0;

  paragraphs.forEach(p => {
    const words = p.replace(/<[^>]+>/g, '').split(/\s+/).length;
    if (wordCount + words > wordsPerPage && current.length > 0) {
      pages.push(current.join(''));
      current = [p];
      wordCount = words;
    } else {
      current.push(p);
      wordCount += words;
    }
  });
  if (current.length > 0) pages.push(current.join(''));
  return pages;
}

const pages = splitIntoPages(CHAPTER_TEXT);
let currentPage = 0;
let isAnimating = false;

// ── Setup ──
document.getElementById('chapter-number-label').textContent = `Chapter ${CHAPTER_NUM}`;
document.getElementById('nav-chapter-label').textContent = `Chapter ${CHAPTER_NUM}`;
document.title = `Chapter ${CHAPTER_NUM} — Irene Lee`;

const titleEl = document.getElementById('chapter-title-display');
if (CHAPTER_TITLE) {
  titleEl.textContent = CHAPTER_TITLE;
} else {
  titleEl.textContent = `Chapter ${CHAPTER_NUM}`;
}

document.getElementById('end-chapter-num').textContent = CHAPTER_NUM;

// Chapter nav links
const prevChBtn = document.getElementById('btn-prev-chapter');
const nextChBtn = document.getElementById('btn-next-chapter');
if (CHAPTER_NUM > 1) {
  prevChBtn.href = `chapter-${CHAPTER_NUM - 1}.html`;
} else {
  prevChBtn.style.display = 'none';
}
if (CHAPTER_NUM < TOTAL_CHAPTERS) {
  nextChBtn.href = `chapter-${CHAPTER_NUM + 1}.html`;
} else {
  nextChBtn.textContent = '🎉 The End';
  nextChBtn.href = 'index.html';
}

function renderPage() {
  const pageEl = document.getElementById('current-page');
  const textEl = document.getElementById('page-text');
  textEl.innerHTML = pages[currentPage];
  if (currentPage === 0) textEl.classList.add('first-page');
  else textEl.classList.remove('first-page');

  // Dots
  const counter = document.getElementById('page-counter');
  counter.innerHTML = pages.map((_, i) =>
    `<span class="page-dot ${i === currentPage ? 'active' : ''}"></span>`
  ).join('') + `&nbsp; <span style="opacity:0.4">${currentPage + 1} / ${pages.length}</span>`;

  // Buttons
  document.getElementById('btn-prev-page').disabled = currentPage === 0;
  document.getElementById('btn-next-page').disabled = currentPage === pages.length - 1;

  // Show chapter end on last page
  const endEl = document.getElementById('chapter-end');
  if (currentPage === pages.length - 1) {
    endEl.classList.add('visible');
  } else {
    endEl.classList.remove('visible');
  }

  // Progress bar
  const progress = ((currentPage + 1) / pages.length) * 100;
  document.getElementById('progress-bar').style.width = progress + '%';
}

function changePage(dir, instant = false) {
  if (isAnimating) return;
  const next = currentPage + dir;
  if (next < 0 || next >= pages.length) return;

  isAnimating = true;
  const pageEl = document.getElementById('current-page');

  const outClass = dir > 0 ? 'flip-out' : 'flip-out-back';
  const inClass  = dir > 0 ? 'flip-in'  : 'flip-in-back';

  pageEl.classList.add(outClass);

  setTimeout(() => {
    currentPage = next;
    pageEl.classList.remove(outClass);
    renderPage();
    pageEl.classList.add(inClass);
    setTimeout(() => {
      pageEl.classList.remove(inClass);
      isAnimating = false;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 500);
  }, 450);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changePage(-1);
});

// Touch/swipe navigation
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) changePage(dx < 0 ? 1 : -1);
}, { passive: true });

// Init
renderPage();

// ══════════════════════════════════════════
//  SKY CANVAS (same as homepage, always night/dusk for reading)
// ══════════════════════════════════════════
const canvas = document.getElementById('sky-canvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const stars = Array.from({length: 160}, () => ({
  x: Math.random(), y: Math.random() * 0.72,
  size: Math.random() * 2.2 + 0.4,
  phase: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.7 + 0.3,
  brightness: Math.random() * 0.6 + 0.4
}));
const waves = [
  { y:0.77, amp:14, freq:0.007, spd:0.5, alpha:0.28, w:2.8 },
  { y:0.81, amp:10, freq:0.011, spd:0.75, alpha:0.20, w:2.0 },
  { y:0.84, amp:7,  freq:0.016, spd:0.4,  alpha:0.14, w:1.5 },
  { y:0.88, amp:4,  freq:0.025, spd:0.9,  alpha:0.09, w:1.0 },
];

function drawChapterSky(ts) {
  const t = ts / 1000;
  const W = canvas.width, H = canvas.height;

  // Deep night sky
  const sg = ctx.createLinearGradient(0, 0, 0, H * 0.85);
  sg.addColorStop(0, '#010206');
  sg.addColorStop(0.5, '#020810');
  sg.addColorStop(1, '#060e1e');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);

  // Moon
  const mx = W * 0.75, my = H * 0.14, mr = 22;
  const mg = ctx.createRadialGradient(mx, my, 0, mx, my, mr * 4);
  mg.addColorStop(0, 'rgba(180,200,255,0.22)');
  mg.addColorStop(1, 'transparent');
  ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mx, my, mr*4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,252,235,0.95)'; ctx.fill();
  ctx.beginPath(); ctx.arc(mx - mr*0.2, my - mr*0.15, mr*0.85, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(5,8,20,0.92)'; ctx.fill();

  // Stars
  stars.forEach(s => {
    const tw = 0.45 + 0.55 * Math.sin(s.phase + t * s.speed);
    const a = s.brightness * tw * 0.92;
    ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,235,${a})`; ctx.fill();
    if (s.size > 1.5 && a > 0.5) {
      ctx.strokeStyle = `rgba(255,255,220,${a*0.4})`; ctx.lineWidth = 0.5;
      const len = s.size * 3;
      ctx.beginPath();
      ctx.moveTo(s.x*W-len, s.y*H); ctx.lineTo(s.x*W+len, s.y*H);
      ctx.moveTo(s.x*W, s.y*H-len); ctx.lineTo(s.x*W, s.y*H+len);
      ctx.stroke();
    }
  });

  // Ocean
  const ot = H * 0.74;
  const og = ctx.createLinearGradient(0, ot, 0, H);
  og.addColorStop(0, 'rgba(5,10,35,0.97)');
  og.addColorStop(1, 'rgba(3,6,20,1)');
  ctx.fillStyle = og; ctx.fillRect(0, ot, W, H - ot);

  // Moon reflection
  const mrg = ctx.createLinearGradient(mx, ot, mx, H);
  mrg.addColorStop(0, 'rgba(180,200,255,0.22)');
  mrg.addColorStop(1, 'transparent');
  ctx.fillStyle = mrg; ctx.fillRect(mx-18, ot, 36, H-ot);

  // Waves
  waves.forEach(wv => {
    const wy = H * wv.y;
    ctx.beginPath(); ctx.moveTo(0, wy);
    for (let x = 0; x <= W; x += 2) {
      const y = wy + Math.sin(x*wv.freq + t*wv.spd)*wv.amp
                   + Math.sin(x*wv.freq*1.7 + t*wv.spd*0.6)*wv.amp*0.4;
      ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(255,255,255,${wv.alpha})`; ctx.lineWidth = wv.w; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, wy);
    for (let x = 0; x <= W; x += 2) {
      const y = wy + Math.sin(x*wv.freq + t*wv.spd)*wv.amp
                   + Math.sin(x*wv.freq*1.7 + t*wv.spd*0.6)*wv.amp*0.4 - 2.5;
      ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(255,255,255,${wv.alpha*0.3})`; ctx.lineWidth = wv.w*0.4; ctx.stroke();
  });

  requestAnimationFrame(drawChapterSky);
}
requestAnimationFrame(drawChapterSky);
</script>
</body>
